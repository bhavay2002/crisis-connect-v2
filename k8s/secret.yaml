# ─────────────────────────────────────────────────────────────────────────────
# TEMPLATE — Do NOT commit real values.
# In production, use Sealed Secrets, External Secrets Operator, or
# inject directly from your CI/CD pipeline.
#
# Create from CLI:
#   kubectl create secret generic crisisconnect-secrets \
#     --from-literal=DATABASE_URL="postgresql://..." \
#     --from-literal=JWT_SECRET="$(openssl rand -hex 32)" \
#     --from-literal=JWT_REFRESH_SECRET="$(openssl rand -hex 32)" \
#     --from-literal=SESSION_SECRET="$(openssl rand -base64 32)" \
#     --from-literal=ENCRYPTION_KEY="$(openssl rand -hex 32)" \
#     --from-literal=OPENAI_API_KEY="sk-..." \
#     --from-literal=REDIS_URL="redis://redis:6379" \
#     --namespace crisisconnect
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: crisisconnect-secrets
  namespace: crisisconnect
type: Opaque
stringData:
  DATABASE_URL:            "postgresql://user:password@postgres:5432/crisisconnect"
  JWT_SECRET:              "REPLACE_WITH_OPENSSL_RAND_HEX_32"
  JWT_REFRESH_SECRET:      "REPLACE_WITH_DIFFERENT_OPENSSL_RAND_HEX_32"
  SESSION_SECRET:          "REPLACE_WITH_OPENSSL_RAND_BASE64_32"
  ENCRYPTION_KEY:          "REPLACE_WITH_64_CHAR_HEX"
  OPENAI_API_KEY:          "sk-REPLACE"
  AI_INTEGRATIONS_OPENAI_API_KEY: "sk-REPLACE"
  OPENWEATHER_API_KEY:     "REPLACE"
  REDIS_URL:               "redis://redis-service:6379"
