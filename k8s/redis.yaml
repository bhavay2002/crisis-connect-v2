apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: crisisconnect
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - --maxmemory 512mb
            - --maxmemory-policy allkeys-lru
            - --save 60 1
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: redis-data
              mountPath: /data
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: redis-data
          emptyDir: {}           # for stateless pub/sub; use PVC for persistence

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: crisisconnect
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
