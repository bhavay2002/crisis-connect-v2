apiVersion: v1
kind: ConfigMap
metadata:
  name: crisisconnect-config
  namespace: crisisconnect
data:
  NODE_ENV: "production"
  PORT: "5000"
  LOG_LEVEL: "info"
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX_REQUESTS: "200"
  DEFAULT_PAGE_SIZE: "20"
  MAX_PAGE_SIZE: "100"
  FRONTEND_URL: "https://crisisconnect.example.com"
  FORCE_MESSAGE_ENCRYPTION: "true"
