groups:
  - name: crisisconnect.api
    interval: 30s
    rules:

      # ── Availability ─────────────────────────────────────────────────────────
      - alert: APIDown
        expr: up{job="crisisconnect-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "CrisisConnect API is down"
          description: "API pod {{ $labels.instance }} has been unreachable for 1 minute."

      # ── Latency ──────────────────────────────────────────────────────────────
      - alert: HighAPILatency
        expr: |
          histogram_quantile(0.95,
            rate(http_request_duration_seconds_bucket{job="crisisconnect-api"}[5m])
          ) > 2
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "API p95 latency > 2s"
          description: "p95 latency is {{ $value | humanizeDuration }} on {{ $labels.route }}."

      - alert: CriticalAPILatency
        expr: |
          histogram_quantile(0.99,
            rate(http_request_duration_seconds_bucket{job="crisisconnect-api"}[5m])
          ) > 5
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "API p99 latency > 5s"
          description: "p99 latency is {{ $value | humanizeDuration }}. SLA breach imminent."

      # ── Error Rate ───────────────────────────────────────────────────────────
      - alert: HighErrorRate
        expr: |
          rate(http_requests_total{job="crisisconnect-api",status=~"5.."}[5m])
          /
          rate(http_requests_total{job="crisisconnect-api"}[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Error rate > 5%"
          description: "{{ $value | humanizePercentage }} of requests are returning 5xx errors."

      - alert: CriticalErrorRate
        expr: |
          rate(http_requests_total{job="crisisconnect-api",status=~"5.."}[5m])
          /
          rate(http_requests_total{job="crisisconnect-api"}[5m]) > 0.15
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Error rate > 15% — incident level"
          description: "{{ $value | humanizePercentage }} error rate. Immediate investigation required."

  - name: crisisconnect.queue
    interval: 30s
    rules:

      # ── Job Queue ─────────────────────────────────────────────────────────────
      - alert: QueueSaturated
        expr: crisis_queue_size >= 90
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Job queue near capacity ({{ $value }}/100)"
          description: "Queue is {{ $value }} deep. Load shedding may activate at 100."

      - alert: QueueShedding
        expr: increase(crisis_queue_shed_total[5m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Job queue is shedding low-priority jobs"
          description: "{{ $value }} jobs shed in the last 5 minutes. Consider scaling workers."

  - name: crisisconnect.websocket
    interval: 30s
    rules:

      - alert: WebSocketDropping
        expr: crisis_ws_connections < 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "No active WebSocket connections"
          description: "Real-time push is not delivering to any clients."

  - name: crisisconnect.database
    interval: 30s
    rules:

      - alert: PostgreSQLDown
        expr: up{job="postgres"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is unreachable"
          description: "Database connection lost. All API write operations will fail."

      - alert: HighDBConnections
        expr: pg_stat_database_numbackends{datname="crisisconnect"} > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connection count high ({{ $value }})"
          description: "Connection pool may be exhausted soon. Current: {{ $value }}."

  - name: crisisconnect.ai
    interval: 60s
    rules:

      - alert: AIAnalysisBacklog
        expr: crisis_ai_queue_pending > 20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "AI analysis backlog: {{ $value }} pending jobs"
          description: "AI pipeline processing is behind. Reports may have delayed analysis."
