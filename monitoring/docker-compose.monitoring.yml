version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# CrisisConnect — Observability Stack
#
# Start alongside the main stack:
#   docker compose -f docker-compose.yml -f monitoring/docker-compose.monitoring.yml up
#
# Dashboards:
#   Grafana:    http://localhost:3001  (admin / admin)
#   Prometheus: http://localhost:9090
# ─────────────────────────────────────────────────────────────────────────────

services:
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: crisisconnect-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"          # POST /-/reload to hot-reload config
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/crisis-alerts.yml:/etc/prometheus/rules/crisis-alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - crisis-net

  grafana:
    image: grafana/grafana:10.4.2
    container_name: crisisconnect-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_SECURITY_ADMIN_USER: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://localhost:3001"
      GF_INSTALL_PLUGINS: grafana-piechart-panel,grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - crisis-net

  # ── PostgreSQL exporter ────────────────────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: crisisconnect-pg-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://crisis:crisis@postgres:5432/crisisconnect?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      - postgres
    networks:
      - crisis-net

  # ── Redis exporter ─────────────────────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: crisisconnect-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://redis:6379"
    ports:
      - "9121:9121"
    depends_on:
      - redis
    networks:
      - crisis-net

volumes:
  prometheus_data:
  grafana_data:

networks:
  crisis-net:
    external: true    # shared with docker-compose.yml
